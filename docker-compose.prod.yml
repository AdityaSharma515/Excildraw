version: '3.9'
services:
  http-backend:
    restart: always
    build:
      context: .
      dockerfile: docker/Dockerfile.http
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL: ${DATABASE_URL}
      - GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      - FRONTEND_URL: ${FRONTEND_URL}
  ws-backend:
    restart: always
    build:
      context: .
      dockerfile: docker/Dockerfile.ws
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
  web:
    restart: always
    build:
      context: .
      dockerfile: docker/Dockerfile.fe
    ports:
      - "3000:3000"
